    <div class="voice-bar" style="margin-bottom:14px;border-radius:var(--radius-lg)">
      <button class="mic-btn speaking" id="btnStopSpeak"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
      <div><div class="voice-label">Denise is speaking</div><div class="voice-transcript">Tap to stop</div></div>
    </div>
  `:`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <button class="mic-btn" id="btnAskDenise" title="Ask Denise"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
      <div><div style="font-size:14px;font-weight:600;color:var(--text)">Ask Denise</div><div style="font-size:12px;color:var(--muted)">Tap the mic — "What's in my diary?" · "Any urgent emails?"</div></div>
    </div>
  `}

  <!-- 5 stat tiles -->
  <div class="stats stats-5">
    <div class="stat"><div class="slbl">${S.calDayOffset===0?'Meetings today':S.calDayOffset===1?'Meetings tomorrow':'Meetings'}</div><div class="sval" style="color:var(--accent)">${S.calEvents.length + S.olCalEvents.length}</div></div>
    <div class="stat"><div class="slbl">Emails to action</div><div class="sval" style="color:${needsReply.length>0?'var(--danger)':'var(--teal)'}">${needsReply.length}</div></div>
    <div class="stat"><div class="slbl">Pocket tasks</div><div class="sval" style="color:var(--accent)">${S.stats.open||0}</div></div>
    <div class="stat"><div class="slbl">Overdue</div><div class="sval" style="color:var(--danger)">${overdue||0}</div></div>
    <div class="stat"><div class="slbl">Recordings</div><div class="sval" style="color:var(--purple)">${S.stats.totalCalls||0}</div></div>
  </div>

  <!-- Dashboard grid: left 2 cols + right tasks column -->
  <div class="dash-layout">
  <div class="dash-left">
    <!-- Weather -->
    <div class="card">
      <div class="chdr"><span class="ctitle">UK Weather</span>${S.weather?`<span class="bdg" style="background:var(--bg);color:var(--text2)">${S.weather.temp}° · ${S.weather.chanceOfRain}% rain</span>`:''}</div>
      ${S.weatherLoading?`<div class="ldr"><div class="spinner"></div>Loading weather...</div>`:
        S.weather?`<div style="padding:14px 18px">
          <div style="display:flex;align-items:center;gap:16px">
            <div style="font-size:36px;font-weight:700;font-family:var(--fb);line-height:1">${S.weather.temp}°</div>
            <div>
              <div style="font-size:14px;font-weight:500;color:var(--text)">${esc(S.weather.desc)}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">Feels like ${S.weather.feelsLike}° · Wind ${S.weather.windMph} mph</div>
            </div>
          </div>
          <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text2);font-family:var(--fd)">
            <span>↑ ${S.weather.maxTemp}°</span>
            <span>↓ ${S.weather.minTemp}°</span>
            <span>💧 ${S.weather.chanceOfRain}%</span>
            <span>🌅 ${esc(S.weather.sunrise)}</span>
            <span>🌇 ${esc(S.weather.sunset)}</span>
          </div>
        </div>`:
        `<div style="padding:14px 18px;font-size:13px;color:var(--muted)">Weather loading on page load...</div>`}
    </div>
    <!-- Diary — compact week strip -->
    <div class="card">
      <div class="chdr"><span class="ctitle">This week</span><div style="display:flex;gap:8px;align-items:center">${S.calWeekLoading?'<div class="spinner" style="width:12px;height:12px"></div>':''}${(S.calEvents.length+S.olCalEvents.length)>0?`<span class="bdg" style="background:var(--accent-dim);color:var(--accent)">${S.calEvents.length+S.olCalEvents.length} today</span>`:''}</div></div>
      ${window._gTok || isOutlookConnected()?`<div class="cal-strip">
        ${[0,1,2,3,4,5,6].map(offset => {
          const d=new Date();d.setDate(d.getDate()+offset);
          const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          const gCount=S.calWeek[key]||0;
          const oCount=(S.olCalWeek||{})[key]||0;
          const dayName=d.toLocaleDateString('en-GB',{weekday:'short'}).slice(0,3);
          return `<div class="cal-day${offset===0?' today':''}" data-cal-offset="${offset}">
            <div class="cal-day-name">${dayName}</div>
            <div class="cal-day-num">${d.getDate()}</div>
            <div class="cal-day-dots">${Array(Math.min(gCount,3)).fill('<div class="cal-day-dot moov"></div>').join('')}${Array(Math.min(oCount,3)).fill('<div class="cal-day-dot despatch"></div>').join('')}</div>
          </div>`;
        }).join('')}
      </div>`:
      S.calError?`<div style="padding:14px 18px"><div style="font-size:13px;color:var(--danger);margin-bottom:6px">${esc(S.calError)}</div><a href="https://console.developers.google.com/apis/api/calendar-json.googleapis.com/overview?project=597561744602" target="_blank" style="font-size:12px;color:var(--accent)">Open Google Cloud Console ↗</a></div>`:
      `<div style="padding:14px 18px;font-size:13px;color:var(--muted)">Load Gmail to connect your calendar.</div>`}
    </div>
  <!-- Emails (spans both left columns) -->
  <div class="card dash-left-full" style="margin-bottom:0">
    <div class="chdr">
      <span class="ctitle">Emails needing attention</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${needsReply.length>0?`<span class="bdg bd">${needsReply.length} to action</span>`:`<span class="bdg bt">${unread} unread</span>`}
        <button style="padding:4px 10px;border-radius:var(--r);border:1px solid var(--border);background:transparent;font-size:11px;font-family:var(--fd);color:var(--muted);cursor:pointer" id="btnRefreshEmail">↻</button>
      </div>
    </div>
    ${S.emailsLoading&&S.emails.length===0?`<div class="ldr"><div class="spinner"></div>Scanning your inbox...</div>`:
      S.emailsError?`
        <div style="padding:14px 18px"><div style="font-size:13px;color:var(--danger);margin-bottom:8px">Gmail error: ${esc(S.emailsError)}</div><button style="padding:8px 18px;border-radius:var(--r);border:none;background:var(--accent);color:white;font-size:13px;font-family:var(--fb);cursor:pointer;font-weight:500" id="btnLoadEmail">Try again</button></div>
      `:S.emails.length===0?`
        <div style="font-size:13px;color:var(--muted);padding:4px 0">Load your inboxes — Denise will flag emails needing a reply.</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button style="padding:8px 18px;border-radius:var(--r);border:none;background:var(--moov);color:white;font-size:13px;font-family:var(--fb);cursor:pointer;font-weight:500" id="btnLoadEmail">Load Gmail</button>
          ${localStorage.getItem('pa_ms_client_id')?`<button style="padding:8px 18px;border-radius:var(--r);border:none;background:var(--despatch);color:white;font-size:13px;font-family:var(--fb);cursor:pointer;font-weight:500" id="btnConnectOutlookDash">Connect Outlook</button>`:''}
        </div>
      `:S.alertsLoading&&needsReply.length===0&&S.emailAlerts.length===0?`
        <div class="ldr"><div class="spinner"></div>Denise is checking which emails need attention...</div>
      `:needsReply.length===0&&!S.alertsLoading?`
        <div style="padding:14px 18px;font-size:13px;color:var(--success);font-weight:500">✓ All clear — no emails need a reply right now.</div>
      `:`
        ${needsReply.map((e,i)=>{
          const origIdx=S.emails.indexOf(e);
          const p=e.alertPriority||'medium';
          const pColors={urgent:['var(--danger)','var(--danger-dim)','var(--danger-text)'],high:['var(--warn)','var(--warn-dim)','var(--warn-text)'],medium:['var(--accent)','var(--accent-dim)','var(--accent)']};
          const [stripe,bg,fg]=pColors[p]||pColors.medium;
          const pLabels={urgent:'⚡ Urgent',high:'↩ Reply today',medium:'📋 Action needed'};
          return`<div class="priority-email" data-goto-email="${origIdx}" style="cursor:pointer">
            <div class="priority-stripe" style="background:${stripe}"></div>
            <div class="priority-email-body">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
                <span class="priority-label" style="background:${bg};color:${fg}">
                  ${pLabels[p]||'↩ Reply needed'}
                </span>
              </div>
              <div class="priority-from">${esc(e.from_name||e.from_email)} <span class="src-badge ${e.source==='moov'?'src-moov':'src-despatch'}">${e.source==='moov'?'Moov':'Despatch'}</span></div>
              <div class="priority-subject">${esc(e.subject)}</div>
              <div class="priority-snippet">${esc((e.snippet||'').slice(0,110))}</div>
            </div>
            <div class="priority-time">${esc(fmtEmailDate(e.date))}</div>
          </div>`;
        }).join('')}
      `}
  </div>

  <!-- Recordings (spans both left columns) -->
  <div class="card dash-left-full" style="margin-bottom:0">
    <div class="chdr">
      <span class="ctitle">Recent recordings</span>
      <span class="bdg" style="background:var(--purple-dim);color:var(--purple)">${S.stats.totalCalls||0} total</span>
    </div>
    ${S.calls.length===0?`<div style="font-size:13px;color:var(--muted)">No recordings yet. Make a recording on your Pocket device.</div>`:`
      ${S.calls.slice(0,5).map(call=>{
        return`<div class="erow" data-goto-call="${esc(call.id)}" style="cursor:pointer">
          <div class="edot" style="background:var(--purple)"></div>
          <div class="einfo">
            <div class="esender">${esc(call.title)}</div>
            <div class="esubj">${fmtDate(call.createdAt)}${call.duration?` · ${Math.round(call.duration/60)} min`:''}</div>
          </div>
          <div class="etime">${call.bulletPoints?.length>0?`<span class="bdg bt" style="font-size:10px">summary</span>`:`<span class="bdg" style="font-size:10px;background:var(--bg);color:var(--muted)">no summary</span>`}</div>
        </div>`;
      }).join('')}
    `}
  </div>
  </div><!-- /dash-left -->

  <!-- Tasks column (right side, spans all rows) -->
  <div class="dash-right">
    ${renderTasksPane()}
  </div>

  </div><!-- /dash-layout -->
  ${renderTaskModal()}

  ${S.calPopupDay?`
  <div class="cal-overlay" id="calOverlay">
    <div class="cal-popup">
      <div class="cal-popup-hdr">
        <div class="cal-popup-title">${(()=>{
          const d=S.calPopupDay.date;
          if(S.calPopupDay.offset===0) return "Today's diary";
          if(S.calPopupDay.offset===1) return "Tomorrow";
          return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
        })()}</div>
        <button class="cal-popup-close" id="btnCalClose">✕</button>
      </div>
      ${S.calPopupLoading?`<div class="ldr"><div class="spinner"></div>Loading events...</div>`:
        S.calPopupEvents.length>0?S.calPopupEvents.map(ev=>`
          <div class="cal-popup-ev">
            <div class="cal-popup-time">${esc(ev.startStr)}</div>
            <div class="cal-popup-info">
              <div class="cal-popup-name">${esc(ev.title)} <span class="src-badge ${ev.source==='moov'?'src-moov':'src-despatch'}" style="vertical-align:middle">${ev.source==='moov'?'Moov':'Despatch'}</span></div>
              ${ev.location?`<div class="cal-popup-loc">${esc(ev.location)}</div>`:''}
              ${ev.attendees.length>0?`<div class="cal-popup-att">${esc(ev.attendees.slice(0,5).join(', '))}</div>`:''}
            </div>
            ${ev.hangoutLink?`<a href="${esc(ev.hangoutLink)}" target="_blank" class="cal-popup-join">Join ↗</a>`:''}
          </div>`).join(''):
        `<div style="padding:20px;text-align:center;font-size:13px;color:var(--muted)">Nothing in the diary — clear day!</div>`}
    </div>
  </div>`:''}
  `;
}


function renderGmailTab(){
  const sel=S.selectedEmail;
  const composing=S.composingReply?.id===sel?.id;
  const combined=S.emails.map((e,i)=>({...e,_src:'moov',_idx:i}));
  combined.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const actionable=combined.filter(e=>e.needsReply);
  const unreadCount=combined.filter(e=>e.is_unread).length;
  const msConnected=isOutlookConnected();

  return `<div class="gmail-layout${sel?' has-detail':''}">
  <!-- Email list -->
  <div class="card gmail-list">
    <div class="chdr">
      <span class="ctitle">Unified inbox</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${actionable.length>0?`<span class="bdg bd">${actionable.length} to action</span>`:`<span class="bdg bt">${unreadCount} unread</span>`}
        <button style="padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--accent);font-size:11px;font-family:var(--fd);cursor:pointer" id="btnRefreshEmail">↻</button>
      </div>
    </div>
    ${!msConnected && localStorage.getItem('pa_ms_client_id')?`<div style="padding:8px 18px;background:var(--despatch-dim);border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--despatch)">Outlook not connected</span>
      <button style="padding:4px 12px;border-radius:var(--r);border:1px solid var(--despatch-border);background:white;color:var(--despatch);font-size:11px;font-family:var(--fd);cursor:pointer" id="btnConnectOutlook">Connect Outlook</button>
    </div>`:''}
    ${S.emailsLoading&&combined.length===0?`<div class="ldr"><div class="spinner"></div>Loading your inbox...</div>`:S.emailsError?`<div style="padding:16px 18px"><div style="font-size:13px;color:var(--danger);margin-bottom:8px">Failed to load Gmail: ${esc(S.emailsError)}</div><button style="padding:9px 18px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:13px;font-family:var(--fd);cursor:pointer" id="btnLoadEmail2">Try again</button></div>`:combined.length===0?`<div style="font-size:13px;color:var(--muted);padding:16px 18px">No emails loaded.<br><br><button style="padding:9px 18px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:13px;font-family:var(--fd);cursor:pointer" id="btnLoadEmail2">Load Gmail inbox</button></div>`:
    combined.map((e,i)=>{
      const isSelected=sel&&sel.id===e.id;
      const needsAction=e.needsReply;
      const srcClass=e._src==='moov'?'src-moov':'src-despatch';
      const srcLabel=e._src==='moov'?'Moov':'Despatch';
      return `<div class="erow ${e.is_unread?'unread':''} ${isSelected?'sel':''}" data-email-src="${e._src}" data-email-srcidx="${e._idx}" style="position:relative;border-left:3px solid ${e._src==='moov'?'var(--moov)':'var(--despatch)'}">
        ${needsAction?`<div style="position:absolute;right:0;top:0;bottom:0;width:3px;background:var(--danger);border-radius:0 2px 2px 0"></div>`:''}
        <div class="edot ${e.is_unread?'':'read'}"></div>
        <div class="einfo">
          <div class="esender">${esc(e.from_name||e.from_email)}${e.msgCount>1?` <span style="font-size:11px;font-weight:400;color:var(--muted)">(${e.msgCount})</span>`:''}</div>
          <div class="esubj">${esc(e.subject)}</div>
        </div>
        <span class="src-badge ${srcClass}">${srcLabel}</span>
        <div class="etime">${esc(fmtEmailDate(e.date))}</div>
      </div>`;
    }).join('')}
  </div>

  ${sel?`<div class="gmail-detail-wrap">
    <button class="gmail-back" id="btnBackToList">← Back to inbox</button>
    <!-- Email detail — shrinks when composing -->
    <div class="edetail" style="flex:${composing?'0 1 auto':'1 1 auto'};overflow-y:auto;${composing?'max-height:40%':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div style="flex:1;min-width:0">
          <div class="esubject">${esc(sel.subject)} <span class="src-badge ${sel.source==='moov'?'src-moov':'src-despatch'}" style="vertical-align:middle;font-size:10px">${sel.source==='moov'?'Moov Parcel':'Despatch Co'}</span></div>
          <div class="emeta">
            <strong>${esc(sel.from_name||sel.from_email)}</strong>${sel.from_email&&sel.from_name?` &lt;${esc(sel.from_email)}&gt;`:''}
            ${sel.date?`<br><span style="color:var(--muted)">${new Date(sel.date).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="ebtn" id="btnTrashEmail" style="color:var(--danger);border-color:var(--danger)" title="Delete">🗑</button>
          <button class="ebtn" id="btnCloseEmail">✕</button>
        </div>
      </div>
      ${sel.bodyLoading?`<div class="ldr"><div class="spinner"></div>Loading email...</div>`:`<div class="ebody">${esc(sel.body||sel.snippet||'')}</div>`}
      ${S.sendSuccess===sel.id?`<div style="margin-top:12px;padding:10px 14px;background:var(--success-dim);border-radius:var(--r);color:var(--success);font-size:13px;font-weight:500">✓ Reply sent successfully</div>`:''}
      ${!composing&&!sel.bodyLoading&&S.sendSuccess!==sel.id?`<div class="eactions">
        <button class="ebtn pri" id="btnDraftReply">✏ Draft reply with Denise</button>
        <button class="ebtn" id="btnVoiceReply">🎙 Voice reply</button>
        <button class="ebtn" id="btnManualReply">↩ Write reply</button>
      </div>`:''}
    </div>

    <!-- Voice reply bar (shown when dictating) -->
    ${S.voiceListening && S.voiceMode==='reply'?`
      <div class="voice-bar listening" style="margin-top:10px;border-radius:var(--radius-lg)">
        <button class="mic-btn listening small" id="btnStopVoice"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
        <div style="flex:1"><div class="voice-label">Tell Denise the gist of your reply...</div><div class="voice-transcript">${esc(S.voiceTranscript)||'"Just say yes we can do that and ask when they need it by"'}</div></div>
      </div>
    `:''}

    <!-- Compose reply — takes remaining space -->
    ${composing?`<div class="compose" style="flex:1 1 auto;display:flex;flex-direction:column;min-height:280px;margin-top:10px">
      <div class="comphdr">
        <span>↩ Reply</span>
        <button class="ebtn" id="btnCancelReply" style="padding:4px 10px;font-size:11px">Cancel</button>
      </div>
      <div class="compto">To: <span>${esc(sel.from_name||sel.from_email)} &lt;${esc(sel.from_email)}&gt;</span></div>
      <textarea class="compa" id="replyArea" placeholder="Type your reply..." style="flex:1">${esc(S.replyDraft)}</textarea>
      <div class="compftr">
        <button class="ebtn pri" id="btnSendReply">Send reply</button>
        <button class="ebtn" id="btnDraftReply">✏ Redraft with Denise</button>
        <button class="mic-btn small" id="btnVoiceRedraft" title="Voice redraft" style="width:30px;height:30px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
        <button class="ebtn" id="btnCopyReply">Copy</button>
        <span class="comp-status" id="compStatus">${S.replyDraft==='Drafting reply...'||S.replyDraft==='Drafting reply from your voice note...'?'Denise is drafting...':S.replyDraft?'Draft ready — edit as needed':''}</span>
      </div>
    </div>`:''}
  </div>`:''}
  </div>`;
}


function renderPocketTab(overdue){
  return `<div class="g2">
  <div class="card">
    <div class="chdr"><span class="ctitle">Task board</span><span class="bdg bd">${overdue||0} overdue</span></div>
    ${S.tasks.length===0?'<div style="font-size:13px;color:var(--muted)">No tasks yet.</div>':''}
    ${S.tasks.slice(0,12).map(t=>{const done=t.status==='done',ov=t.status==='overdue';return`<div class="trow ${done?'done':''}" data-toggle="${esc(t.id)}"><div class="tchk ${done?'done':''}">${done?`<svg width="9" height="7" viewBox="0 0 9 7"><polyline points="1,3.5 3.5,6 8,1" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`:''}</div><span class="ttxt ${done?'done':''}">${esc(t.text)}</span>${t.source==='pocket'?'<span class="tsrc">POCKET</span>':''}<span class="tdue ${ov?'ov':''}">${esc(t.due)}</span></div>`;}).join('')}
    <div class="addrow"><input class="addinp" id="newTask2" placeholder="Add a task..." /><button class="addbtn" id="btnAddTask2">+ Add</button></div>
  </div>
  <div class="card">
    <div class="chdr"><span class="ctitle">Recordings</span><span class="bdg bp">${S.calls.length} total</span></div>
    ${S.calls.length===0?'<div style="font-size:13px;color:var(--muted)">No recordings yet.</div>':''}
    ${S.calls.map(call=>{const sel=S.selectedCall?.id===call.id;return`<div class="erow ${sel?'sel':''}" data-call="${esc(call.id)}">
        <div class="edot" style="background:var(--purple)"></div>
        <div class="einfo">
          <div class="esender">${esc(call.title)}</div>
          <div class="esubj">${fmtDate(call.createdAt)}${call.duration?` · ${Math.round(call.duration/60)} min`:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${call.bulletPoints?.length>0?`<span class="bdg bt" style="font-size:10px">summary</span>`:`<span class="bdg" style="font-size:10px;background:var(--bg);color:var(--muted)">no summary</span>`}
          <button class="delete-call-btn" data-delete="${esc(call.id)}" style="width:24px;height:24px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s" onmouseenter="this.style.opacity='1';this.style.borderColor='var(--danger)';this.style.color='var(--danger)'" onmouseleave="this.style.opacity='0';this.style.borderColor='transparent';this.style.color='var(--muted)'"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg></button>
        </div>
      </div>
    ${sel?`<div class="det">
        <div class="det-title">${esc(call.title)}</div>
        <div class="det-meta">${fmtDate(call.createdAt)}${call.duration?` · ${Math.round(call.duration/60)} min`:''}</div>
        ${call.bulletPoints?.length>0?`<div class="det-section"><div class="det-label">Summary</div>${call.bulletPoints.map(b=>`<div class="bullet">${esc(b)}</div>`).join('')}</div>`:call.summary?`<div class="det-section"><div class="det-label">Summary</div><div style="font-size:13px;color:var(--text2)">${esc(call.summary)}</div></div>`:'<div style="font-size:13px;color:var(--muted)">No summary yet.</div>'}
        ${call.actionItems?.length>0?`<div class="det-section"><div class="det-label">Action items</div>${call.actionItems.map(a=>`<div class="bullet">${esc(a.title)}</div>`).join('')}</div>`:''}
        ${call.transcript?`<div class="det-section"><div class="det-label">Transcript</div><div class="transcript-box">${esc(call.transcript)}</div></div>`:''}
      </div>`:''}`;}).join('')}
  </div>
  </div>`;
}

function renderPATab(){
  const prompts=['What needs my attention today?','Summarise my unread emails','Draft a reply to my most urgent email','What action items came from my last recording?','What\'s in my diary this week?'];
  const hasMessages = S.messages.length > 1 || S.chatLoading;
  return `<div class="chat-container">
  <div class="chat-header">
    <div class="chat-avatar"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>
    <div class="chat-hdr-info">
      <div class="chat-hdr-name">Chat with Denise</div>
      <div class="chat-hdr-sub">${S.tasks.length} tasks · ${S.emails.length} emails · your PA is ready</div>
    </div>
    <div class="chat-hdr-mic">
      <button class="mic-btn small" id="btnAskDeniseChat" title="Ask by voice"${S.voiceListening?' style="display:none"':''}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      </button>
      <div class="chat-hdr-status"><div class="chat-hdr-dot"></div><span style="font-size:11px;color:var(--muted);font-family:var(--fd)">Online</span></div>
    </div>
  </div>
  ${!hasMessages?`<div class="chat-prompts">${prompts.map(q=>`<button class="chat-prompt-btn" data-quick="${esc(q)}">${esc(q)}</button>`).join('')}</div>`:''}
  <div class="msgs" id="messages">
    ${S.messages.map(m=>`<div class="msg ${m.role}">
      <div class="msg-avi">${m.role==='ai'?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`:'R'}</div>
      <div class="mbub ${m.role}">${esc(m.text)}</div>
    </div>`).join('')}
    ${S.chatLoading?`<div class="msg ai"><div class="msg-avi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div><div class="mbub ai"><span class="thk">Denise is thinking...</span></div></div>`:''}
  </div>
  ${hasMessages?`<div class="chat-prompts">${prompts.map(q=>`<button class="chat-prompt-btn" data-quick="${esc(q)}">${esc(q)}</button>`).join('')}</div>`:''}
  <div class="chat-input-area">
    <input class="chat-inp" id="chatInput" placeholder="Ask Denise anything..." />
    <button class="chat-send" id="btnSend" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
    </button>
  </div>
  </div>`;
}

function bindEvents(){
  // Nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{btn.addEventListener('click',()=>{S.tab=btn.dataset.tab;render();if(S.tab==='gmail'){if(S.emails.length===0&&!S.emailsLoading)fetchEmails();}});});
  // Wizard
  const ui=document.getElementById('backendUrl');if(ui)ui.addEventListener('input',e=>S.backendUrl=e.target.value);
  const bcb=document.getElementById('btnCheckBackend');if(bcb)bcb.addEventListener('click',()=>{S.backendUrl=document.getElementById('backendUrl')?.value||S.backendUrl;wizCheckBackend();});
  const ki=document.getElementById('apiKey');if(ki)ki.addEventListener('input',e=>S.apiKey=e.target.value);
  const bvk=document.getElementById('btnVerifyKey');if(bvk)bvk.addEventListener('click',()=>{S.apiKey=document.getElementById('apiKey')?.value||S.apiKey;wizVerifyKey();});
  const bcw=document.getElementById('btnCheckWebhook');if(bcw)bcw.addEventListener('click',wizCheckWebhook);
  const bsk=document.getElementById('btnSkip');if(bsk)bsk.addEventListener('click',wizSkip);
  // Header
  const bsy=document.getElementById('btnSync');if(bsy)bsy.addEventListener('click',syncPocket);
  const bfs=document.getElementById('btnForceSync');if(bfs)bfs.addEventListener('click',()=>{forceSyncPocket();if(isOutlookConnected()){fetchOutlookCalendar();fetchOutlookCalendarWeek();}});
  const brs=document.getElementById('btnReset');if(brs)brs.addEventListener('click',()=>{if(confirm('Reset Denise?')){localStorage.removeItem('pa_setup_done');localStorage.removeItem('pa_api_base');S.wizStep=1;S.apiKey='';S.keyResult=null;S.tasks=[];S.calls=[];S.emails=[];S.olCalEvents=[];S.olCalWeek={};render();}});
  const bos=document.getElementById('btnOutlookSettings');if(bos)bos.addEventListener('click',async()=>{
    const connected=isOutlookConnected();
    if(connected){
      alert('Outlook is connected via Power Automate.\n\nCalendar events are being pushed automatically.\n\nTo change settings, edit your Power Automate flows at flow.microsoft.com');
    } else {
      alert('Outlook is not connected yet.\n\nYou need 1 Power Automate flow:\n\nCALENDAR FLOW — Recurrence (every 30 min) → "Get events" → Send HTTP POST to:\n   ' + API() + '/webhook/outlook/calendar\n\nSee instructions from Denise for full setup details.');
    }
  });
  const bvs=document.getElementById('btnVoiceSettings');if(bvs)bvs.addEventListener('click',()=>{
    const current=localStorage.getItem('pa_elevenlabs_key')||'';
    const key=prompt('ElevenLabs API key for natural voice (leave blank for browser voice):',current);
    if(key===null) return; // cancelled
    if(key.trim()){localStorage.setItem('pa_elevenlabs_key',key.trim());alert('ElevenLabs voice enabled! Denise will now speak with a natural voice.');}
    else{localStorage.removeItem('pa_elevenlabs_key');localStorage.removeItem('pa_elevenlabs_voice');alert('Switched to browser voice.');}
    render();
  });
  // Pocket tasks
  document.querySelectorAll('[data-toggle]').forEach(r=>r.addEventListener('click',()=>toggleTask(r.dataset.toggle)));
  const nt=document.getElementById('newTask');if(nt){nt.addEventListener('input',e=>S.newTask=e.target.value);nt.addEventListener('keydown',e=>{if(e.key==='Enter')addTask(nt.value);});}
  const nt2=document.getElementById('newTask2');if(nt2)nt2.addEventListener('keydown',e=>{if(e.key==='Enter')addTask(nt2.value);});
  const bat=document.getElementById('btnAddTask');if(bat)bat.addEventListener('click',()=>addTask(document.getElementById('newTask')?.value||''));
  const bat2=document.getElementById('btnAddTask2');if(bat2)bat2.addEventListener('click',()=>addTask(document.getElementById('newTask2')?.value||''));
  // Tasks pane — open modal
  const bOpenModal=document.getElementById('btnOpenTaskModal');
  if(bOpenModal)bOpenModal.addEventListener('click',()=>{S.taskModalOpen=true;render();setTimeout(()=>{const f=document.getElementById('tmTaskName');if(f)f.focus();},50);});
  // Task modal bindings
  const tmOverlay=document.getElementById('taskModalOverlay');
  const tmClose=document.getElementById('btnCloseTaskModal');
  const tmCancel=document.getElementById('btnCancelTask');
  const tmSave=document.getElementById('btnSaveTask');
  if(tmOverlay)tmOverlay.addEventListener('click',e=>{if(e.target===tmOverlay){S.taskModalOpen=false;render();}});
  if(tmClose)tmClose.addEventListener('click',()=>{S.taskModalOpen=false;render();});
  if(tmCancel)tmCancel.addEventListener('click',()=>{S.taskModalOpen=false;render();});
  // Business toggle in modal
  const tmBizM=document.getElementById('tmBizMoov');
  const tmBizD=document.getElementById('tmBizDespatch');
  if(tmBizM)tmBizM.addEventListener('click',()=>{tmBizM.className='active-moov';tmBizD.className='';});
  if(tmBizD)tmBizD.addEventListener('click',()=>{tmBizD.className='active-despatch';tmBizM.className='';});
  // Save task from modal
  if(tmSave)tmSave.addEventListener('click',()=>{
    const name=document.getElementById('tmTaskName')?.value||'';
    const details=document.getElementById('tmTaskDetails')?.value||'';
    const date=document.getElementById('tmTaskDate')?.value||'';
    const priority=document.getElementById('tmTaskPriority')?.value||'auto';
    const biz=document.getElementById('tmBizDespatch')?.className?.includes('active')?'despatch':'moov';
    addTask(name,date,biz,details,priority);
  });
  // Enter key in task name field
  const tmNameInput=document.getElementById('tmTaskName');
  if(tmNameInput)tmNameInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();tmSave?.click();}});
  document.querySelectorAll('[data-toggle-task]').forEach(el=>el.addEventListener('click',()=>toggleTask(el.dataset.toggleTask)));
  // Task voice input
  const btv=document.getElementById('btnTaskVoice');if(btv)btv.addEventListener('click',()=>{
    if(btv.classList.contains('recording')){
      if(window._taskRecog){window._taskRecog.stop();window._taskRecog=null;}
      btv.classList.remove('recording');
      return;
    }
    if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){alert('Speech recognition not supported in this browser');return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();r.lang='en-GB';r.interimResults=false;r.maxAlternatives=1;
    r.onresult=e=>{
      const text=e.results[0][0].transcript;
      const inp=document.getElementById('tmTaskName')||document.getElementById('taskInput');if(inp)inp.value=text;
      btv.classList.remove('recording');window._taskRecog=null;
    };
    r.onerror=()=>{btv.classList.remove('recording');window._taskRecog=null;};
    r.onend=()=>{btv.classList.remove('recording');window._taskRecog=null;};
    window._taskRecog=r;r.start();btv.classList.add('recording');
  });
  // Recordings
  document.querySelectorAll('[data-call]').forEach(r=>{r.addEventListener('click',()=>{const c=S.calls.find(x=>x.id===r.dataset.call);S.selectedCall=S.selectedCall?.id===r.dataset.call?null:c;render();});});
  document.querySelectorAll('[data-delete]').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();deleteCall(b.dataset.delete);});});
  // Calendar nav
  // Calendar week strip — click a day to open popup
  document.querySelectorAll('[data-cal-offset]').forEach(el=>{
    el.addEventListener('click',()=>openCalendarDay(parseInt(el.dataset.calOffset)));
  });
  const bcc=document.getElementById('btnCalClose');if(bcc)bcc.addEventListener('click',closeCalendarPopup);
  const cov=document.getElementById('calOverlay');if(cov)cov.addEventListener('click',(e)=>{if(e.target===cov)closeCalendarPopup();});
  // Gmail
  const ble=document.getElementById('btnLoadEmail');if(ble)ble.addEventListener('click',fetchEmails);
  const ble2=document.getElementById('btnLoadEmail2');if(ble2)ble2.addEventListener('click',fetchEmails);
  const bre=document.getElementById('btnRefreshEmail');if(bre)bre.addEventListener('click',()=>{fetchEmails();});
  const bco=document.getElementById('btnConnectOutlook');if(bco)bco.addEventListener('click',connectOutlook);
  const bcod=document.getElementById('btnConnectOutlookDash');if(bcod)bcod.addEventListener('click',connectOutlook);
  document.querySelectorAll('[data-email-src]').forEach(row=>{row.addEventListener('click',async()=>{
    const idx=parseInt(row.dataset.emailSrcidx);
    const email={...S.emails[idx]};
    S.selectedEmailIdx=idx;S.selectedEmail={...email,bodyLoading:true,source:'moov'};S.composingReply=null;render();
    const full=await fetchEmailBody(email.id);S.selectedEmail={...S.selectedEmail,...(full||{}),bodyLoading:false};render();
  });});
  document.querySelectorAll('[data-goto-email]').forEach(b=>{b.addEventListener('click',()=>{const idx=parseInt(b.dataset.gotoEmail);S.tab='gmail';S.selectedEmailIdx=idx;S.selectedEmail={...S.emails[idx],bodyLoading:true,source:'moov'};render();fetchEmailBody(S.emails[idx].id).then(full=>{S.selectedEmail={...S.selectedEmail,...(full||{}),bodyLoading:false};render();});});});
  document.querySelectorAll('[data-goto-call]').forEach(b=>{b.addEventListener('click',()=>{const c=S.calls.find(x=>x.id===b.dataset.gotoCall);if(c){S.tab='pocket';S.selectedCall=c;render();}});});
  const bdr=document.getElementById('btnDraftReply');if(bdr)bdr.addEventListener('click',()=>draftReply(S.selectedEmail));
  const bmr=document.getElementById('btnManualReply');if(bmr)bmr.addEventListener('click',()=>{S.composingReply=S.selectedEmail;S.replyDraft='';render();setTimeout(()=>{const ta=document.getElementById('replyArea');if(ta)ta.focus();},50);});
  const bsr=document.getElementById('btnSendReply');if(bsr)bsr.addEventListener('click',()=>{sendReply(S.selectedEmail);});
  const bte=document.getElementById('btnTrashEmail');if(bte)bte.addEventListener('click',()=>{trashEmail(S.selectedEmail);});
  const bce=document.getElementById('btnCloseEmail');if(bce)bce.addEventListener('click',()=>{S.selectedEmail=null;S.composingReply=null;render();});
  const bbl=document.getElementById('btnBackToList');if(bbl)bbl.addEventListener('click',()=>{S.selectedEmail=null;S.composingReply=null;render();});
  const bcr=document.getElementById('btnCancelReply');if(bcr)bcr.addEventListener('click',()=>{S.composingReply=null;render();});
  const bcop=document.getElementById('btnCopyReply');if(bcop)bcop.addEventListener('click',()=>{const a=document.getElementById('replyArea');navigator.clipboard.writeText(a?.value||S.replyDraft);bcop.textContent='Copied!';setTimeout(()=>bcop.textContent='Copy to clipboard',2000);});
  // Voice
  const bad=document.getElementById('btnAskDenise');if(bad)bad.addEventListener('click',()=>startListening('ask'));
  const badc=document.getElementById('btnAskDeniseChat');if(badc)badc.addEventListener('click',()=>startListening('ask'));
  const bvr=document.getElementById('btnVoiceReply');if(bvr)bvr.addEventListener('click',()=>startListening('reply'));
  const bvrd=document.getElementById('btnVoiceRedraft');if(bvrd)bvrd.addEventListener('click',()=>startListening('reply'));
  const bsv=document.getElementById('btnStopVoice');if(bsv)bsv.addEventListener('click',()=>stopListening());
  const bss=document.getElementById('btnStopSpeak');if(bss)bss.addEventListener('click',()=>{speechSynthesis.cancel();S.voiceSpeaking=false;render();});
  // Chat
  const ci=document.getElementById('chatInput');if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter'){sendChat(ci.value);ci.value='';}});
  const bs=document.getElementById('btnSend');if(bs)bs.addEventListener('click',()=>{const i=document.getElementById('chatInput');if(i){sendChat(i.value);i.value='';}});
  document.querySelectorAll('[data-quick]').forEach(b=>{b.addEventListener('click',()=>{const i=document.getElementById('chatInput');if(i)i.value=b.dataset.quick;});});
  scrollChat();
}

let pollInterval=null;
function startPolling(){if(pollInterval)clearInterval(pollInterval);pollInterval=setInterval(fetchData,30000);}

render();
if(isSetup()){
  // Auto-restore Pocket API key to backend after redeploy
  const savedKey=localStorage.getItem('pa_pocket_key');
  if(savedKey){
    fetch(`${API()}/api/setup/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:savedKey})}).catch(()=>{});
  }
  fetchData();startPolling();
  fetchWeather(); // No auth needed — loads on every page visit
  // Auto-load Gmail + Calendar if we have a cached token (no popup needed)
  const savedTok = localStorage.getItem('pa_gmail_token');
  const savedExp = parseInt(localStorage.getItem('pa_gmail_token_exp') || '0');
  if(savedTok && savedExp > Date.now()){
    console.log('[Denise] Found cached token, auto-loading Gmail + Calendar');
    fetchEmails(); // getGoogleToken() inside will validate & use the cached token
    // Background refresh Gmail every 15 minutes
    setInterval(()=>{
      console.log('[Denise] 15-min background Gmail refresh');
      fetchEmails();
    }, 15 * 60 * 1000);
  }
  // Auto-load Outlook if backend is configured (IMAP/ICS)
  setTimeout(async()=>{
    const olOk = await checkOutlookStatus();
    if(olOk){
      console.log('[Denise] Outlook configured via IMAP/ICS, auto-loading');
      fetchOutlookCalendar();
      fetchOutlookCalendarWeek();
    }
  }, 500);
}
